  - name: centro-medico-btp-ui-deployer
    type: com.sap.application.content
    path: app
    requires:
      - name: centro-medico-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - adminturnosui.zip
          name: centro-medico-adminturnosui
          target-path: resources/

  - name: centro-medico-adminturnosui
    type: html5
    path: app/adminturnosui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
        - node -e "const fs=require('fs');const path=require('path');const JSZip=require('jszip');const zip=new JSZip();const addFolder=(dir,base)=>{fs.readdirSync(dir).forEach(f=>{const full=path.join(dir,f);const rel=path.join(base,f);if(fs.statSync(full).isDirectory())addFolder(full,rel);else zip.file(rel.replace(/\\\\/g,'/'),fs.readFileSync(full));});};addFolder('dist','');zip.generateAsync({type:'nodebuffer'}).then(b=>{fs.writeFileSync('dist/adminturnosui.zip',b);});"
      supported-platforms: []

