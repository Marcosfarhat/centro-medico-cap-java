_schema-version: "3.1"
ID: centro-medico-btp
version: 1.0.0
description: Centro Medico BTP - CAP Java + Fiori Elements

modules:

  - name: centro-medico-btp-srv
    type: java
    path: srv
    parameters:
      buildpack: sap_java_buildpack_jakarta
      readiness-health-check-type: process
      start-timeout: 300
    properties:
      SPRING_PROFILES_ACTIVE: cloud
      JBP_CONFIG_COMPONENTS: "jres: ['com.sap.xs.java.buildpack.jdk.SAPMachineJDK']"
      JBP_CONFIG_SAP_MACHINE_JDK: "{ version: 21.+ }"
    build-parameters:
      builder: custom
      commands:
        - mvn clean package -DskipTests
      build-result: target/*.jar
    requires:
      - name: centro-medico-xsuaa
      - name: centro-medico-hana
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  - name: centro-medico-btp-db-deployer
    type: hdb
    path: db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: centro-medico-hana

  - name: centro-medico-btp-approuter
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
    requires:
      - name: centro-medico-xsuaa
      - name: centro-medico-html5-repo-runtime
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

  - name: centro-medico-btp-ui-deployer
    type: com.sap.application.content
    path: app
    requires:
      - name: centro-medico-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - adminturnosui.zip
          name: centro-medico-adminturnosui
          target-path: resources/

  - name: centro-medico-adminturnosui
    type: html5
    path: app/adminturnosui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

resources:

  - name: centro-medico-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: centro-medico-btp
        tenant-mode: dedicated

  - name: centro-medico-hana
    type: org.cloudfoundry.managed-service
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: centro-medico-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: centro-medico-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime