_schema-version: "3.1"
ID: centro-medico-btp
description: Centro Medico BTP - CAP Java + Fiori Elements
version: 1.0.0
modules:
- name: centro-medico-btp-srv
  type: java.tomcat
  path: centro-medico-btp-srv
  properties:
    JBP_CONFIG_COMPONENTS: 'jres: [''com.sap.xs.java.buildpack.jdk.SAPMachineJDK'']'
    JBP_CONFIG_SAP_MACHINE_JDK: '{ version: 21.+ }'
    SPRING_PROFILES_ACTIVE: cloud
  requires:
  - name: centro-medico-xsuaa
  - name: centro-medico-hana
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: sap_java_buildpack_jakarta
    readiness-health-check-type: process
    start-timeout: 300
- name: centro-medico-btp-db-deployer
  type: com.sap.xs.hdi
  path: centro-medico-btp-db-deployer
  requires:
  - name: centro-medico-hana
  parameters:
    buildpack: nodejs_buildpack
- name: centro-medico-btp-approuter
  type: javascript.nodejs
  path: centro-medico-btp-approuter
  requires:
  - name: centro-medico-xsuaa
  - name: centro-medico-html5-repo-runtime
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  parameters:
    keep-existing-routes: true
- name: centro-medico-btp-ui-deployer
  type: com.sap.application.content
  path: centro-medico-btp-ui-deployer
  requires:
  - name: centro-medico-html5-repo-host
    parameters:
      content-target: true
resources:
- name: centro-medico-xsuaa
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      tenant-mode: dedicated
      xsappname: centro-medico-btp
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: centro-medico-hana
  type: org.cloudfoundry.managed-service
  parameters:
    service: hana
    service-plan: hdi-shared
- name: centro-medico-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host
- name: centro-medico-html5-repo-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-runtime
